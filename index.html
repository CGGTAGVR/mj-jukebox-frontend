<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MJ Jukebox</title>
    <script src="./socket.io.min.js"></script>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        #player-container { max-width: 560px; margin: 0 auto; background: #000; height: 315px; }
        iframe { width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>
    <h1>MJ Jukebox</h1>
    <button id="start-btn" style="display:block; margin: 0 auto 20px; padding: 10px 20px; cursor: pointer;">Click to Sync Audio</button>
    <div id="player-container">
        <iframe id="video-frame" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
    </div>
    
    <script>
        // CRITICAL: We point to location.origin (discordsays.com) 
        // Discord's Proxy mapping translates /api requests to your Render backend automatically.
        const socket = io(window.location.origin, {
            path: '/api/socket.io',
            transports: ['websocket']
        });

        const frame = document.getElementById("video-frame");

        socket.on("room-sync", (state) => {
            console.log("Sync received:", state); // Check your console for this!
            const status = document.getElementById("player-status");
            const frame = document.getElementById("video-frame");

            if (!state || !state.playing) {
                if (status) status.innerText = "Sync Status: Paused";
                return;
            }
            
            // Force the iframe to load the video
            if (frame && state.songId) {
                frame.src = `https://www.youtube.com/embed/${state.songId}?autoplay=1`;
                console.log("Setting iframe src to:", frame.src);
            }
            
            if (status) status.innerText = `Now Playing: "${state.songId}"`;
        });

        // Trigger initial state
        socket.emit("join-room", "local-room");
    </script>
</body>
</html>
