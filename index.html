<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Jukebox</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            padding: 20px; 
            padding-bottom: 90px; 
            margin: 0; 
        }
        h1 { 
            text-align: center; 
            color: #f1c40f; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 5px; 
        }
        p.subtitle { 
            text-align: center; 
            color: #888; 
            margin-bottom: 25px; 
        }
        #player-container { 
            margin: 0 auto 30px auto; 
            max-width: 560px; 
            background: #000; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            position: relative; 
            padding-bottom: 315px; 
            height: 0; 
        }
        #player-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: 0; 
        }
        .grid-layout { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto;
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 10px;
        }
        .grid-layout::-webkit-scrollbar {
            width: 8px;
        }
        .grid-layout::-webkit-scrollbar-track {
            background: #1e1e1e;
            border-radius: 4px;
        }
        .grid-layout::-webkit-scrollbar-thumb {
            background: #f1c40f;
            border-radius: 4px;
        }
        .album-box { 
            background: #1e1e1e; 
            border: 1px solid #333; 
            border-radius: 8px; 
            padding: 15px; 
            height: fit-content;
        }
        .album-header { 
            font-size: 1.2em; 
            font-weight: bold; 
            color: #f1c40f; 
            border-bottom: 2px solid #333; 
            padding-bottom: 8px; 
            margin-bottom: 10px; 
        }
        .track-list { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
        }
        .track-item { 
            padding: 10px; 
            margin: 6px 0; 
            background: #292929; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: background 0.2s, color 0.2s; 
            font-size: 0.95em; 
        }
        .track-item:hover { 
            background: #3d3d3d; 
            color: #fff; 
        }
        #player-status { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #0a0a0a; 
            border-top: 3px solid #f1c40f; 
            padding: 15px; 
            text-align: center; 
            font-size: 1.1em; 
            font-weight: bold; 
            box-sizing: border-box; 
            z-index: 999; 
        }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <h1>MJ Jukebox</h1>
    <p class="subtitle">The Ultimate Collection</p>
    
    <div id="player-container">
        <iframe id="video-frame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="grid-layout" id="shelf"></div>

    <div id="player-status">Select a track to start streaming...</div>

    <script src="./client.js"></script>
</body>
</html>
