<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MJ Jukebox</title>
    <script src="./socket.io.min.js"></script>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        #player-container { max-width: 560px; margin: 0 auto; background: #000; height: 315px; }
        iframe { width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>
    <h1>MJ Jukebox</h1>
    <button id="start-btn" style="display:block; margin: 0 auto 20px; padding: 10px 20px; cursor: pointer;">Click to Sync Audio</button>
    <div id="player-container">
        <iframe id="video-frame" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
    </div>
    
    <script>
        const socket = io(window.location.origin, {
            path: '/api/socket.io',
            transports: ['websocket']
        });

        // Add the song catalog here so the code knows what to play!
        const songs = {
            "thriller": "sOnqjkJTMaA",
            "beat-it": "oRdxUFDoQe0",
            "bad": "dsUXAEzaC3Q"
            // You can add more songs here in the format "id": "ytId"
        };

        const frame = document.getElementById("video-frame");

        socket.on("room-sync", (state) => {
            if (state && state.playing && state.songId) {
                const ytId = songs[state.songId] || state.songId; // Use song list, or raw ID
                frame.src = `https://www.youtube.com/embed/${ytId}?enablejsapi=1`;
                console.log("Loading video ID:", ytId);
            }
        });

        document.getElementById("start-btn").onclick = () => {
            socket.emit("join-room", "local-room");
            document.getElementById("start-btn").style.display = "none";
            // For testing, let's trigger a song immediately on click:
            socket.emit("play-track", { instanceId: "local-room", songId: "thriller" });
        };
    </script>
</body>
</html>
